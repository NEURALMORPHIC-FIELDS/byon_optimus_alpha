name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (CPU torch + dev)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy requests pytest pytest-cov
          pip install fastapi httpx pydantic   # v10.1 World Connector (gateway) tests

      - name: Stage level3-research checkout (for the real-BYON import test)
        run: |
          git -c core.longpaths=true clone --no-checkout --depth 1 \
            --branch research/level-3-natural-omega \
            https://github.com/NEURALMORPHIC-FIELDS/byon_optimus.git \
            runtime/dcortex_run/byon_optimus_level3_real_source || true
          if [ -d runtime/dcortex_run/byon_optimus_level3_real_source/.git ]; then
            cd runtime/dcortex_run/byon_optimus_level3_real_source
            git config core.sparseCheckout true
            printf '%s\n' '/byon-orchestrator/level3-research/' > .git/info/sparse-checkout
            git checkout || true
          fi

      - name: Compile check
        run: |
          python -m py_compile dcortex/v99_source.py
          python -m py_compile orchestration/integrate.py
          python -m py_compile orchestration/dcortex_v99_adapter.py

      - name: Fast CPU tests
        run: python -m pytest tests/ -m "not slow and not live" -v
